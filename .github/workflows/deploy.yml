name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Generate evolution.json
        run: npm run process -- examples/india-districts/janapada.yml

      - name: Install viewer dependencies
        run: npm ci
        working-directory: viewer

      - name: Copy assets and generate config.json
        run: node scripts/setup-viewer.cjs examples/india-districts/janapada.yml --base /janapada/

      - name: Build viewer
        run: npm run build
        working-directory: viewer
        env:
          VITE_BASE_URL: /janapada/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
